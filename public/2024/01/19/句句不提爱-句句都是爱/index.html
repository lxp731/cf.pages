            <p>两情若是久长时，又岜在朝朝暮暮。</p>
<p>偏我来时不逢春，偏我去时春满城。                                                                                                      </p>
<p>怀民亦末寝，假寐盖以诱敌。</p>
<p>庭有枇杷树，吾妻死之年所手植也。</p>
<p>十里灯火尽繁华，一生唯愿岁如初。</p>
<p>众里寻她千百度，那人却在灯火阑珊处。</p>
<p>人道洛阳花似锦，偏我来时不逢春。</p>
<p>繁星四百八十万，颗颗鉴照老臣心。</p>
<p>遇你如春水映梨花，见你如蝉鸣衬春夏。</p>
